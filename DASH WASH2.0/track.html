<!DOCTYPE html>
<html>
<head>
  <title>Track Your Order - DashWash</title>
</head>
<body style="background:#f5f5f5;">

<div style="text-align:center; padding:40px; max-width:500px; margin:100px auto; background:white; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1); font-family:Arial;">
  <h2>Track Your Order</h2>
  <input type="text" id="orderId" placeholder="Enter Order ID e.g. DW-001" 
         style="padding:12px; width:70%; border-radius:8px; border:1px solid #ccc; font-size:16px;">
  <button onclick="trackOrder()" 
          style="padding:12px 20px; background:#007bff; color:white; border:none; border-radius:8px; font-size:16px; cursor:pointer;">
    Track
  </button>
  <p id="statusResult" style="margin-top:20px; font-size:22px; font-weight:bold; color:#007bff;"></p>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzyYNZjyfebZ3wtU_iww6cTmQK_Rrti-91gs6iyrjCkLS4Xnnnd-kyOOlT3mPHccPyZbw/exec";

function trackOrder() {
  var orderId = document.getElementById("orderId").value.trim();
  var result = document.getElementById("statusResult");
  
  if(orderId == "") {
    result.innerHTML = "Please enter an Order ID";
    result.style.color = "red";
    return;
  }
  
  result.innerHTML = "Searching...";
  result.style.color = "#007bff";
  
  fetch(SCRIPT_URL + "?orderId=" + orderId)
  .then(response => response.text())
  .then(data => {
    if(data == "Order Not Found"){
      result.innerHTML = "Order Not Found. Check your ID";
      result.style.color = "red";
    } else {
      result.innerHTML = "Current Status: " + data;
      result.style.color = "green";
    }
  })
  .catch(error => {
    result.innerHTML = "Error. Please try again.";
    result.style.color = "red";
  });
}
</script>

</body>
</html>
